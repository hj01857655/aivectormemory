<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标签管理 - 设计稿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'IBM Plex Sans', sans-serif; background: #0F172A; color: #F1F5F9; font-size: 14px; line-height: 1.5; padding: 28px 32px; }

/* Page Header */
.page-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; }
.page-title { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
.page-count { font-size: 13px; color: #64748B; }

/* Toolbar */
.toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
.search-box { position: relative; flex: 1; max-width: 360px; }
.search-input { width: 100%; padding: 9px 32px 9px 36px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; color: #F1F5F9; background: #1E293B; font-family: inherit; }
.search-input:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.search-input::placeholder { color: #475569; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #64748B; }

/* Action Buttons */
.btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 6px; }
.btn--primary { background: #2563EB; color: #fff; }
.btn--primary:hover { background: #3B82F6; }
.btn--secondary { background: #334155; color: #CBD5E1; }
.btn--secondary:hover { background: #475569; }
.btn--danger { background: rgba(239,68,68,0.15); color: #F87171; }
.btn--danger:hover { background: rgba(239,68,68,0.25); }
.btn--ghost { background: transparent; color: #60A5FA; padding: 4px 10px; }
.btn--ghost:hover { background: rgba(59,130,246,0.1); }
.btn--sm { padding: 4px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Tag Table */
.tag-table { width: 100%; border-collapse: collapse; }
.tag-table th { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #64748B; text-align: left; padding: 12px 16px; border-bottom: 1px solid #334155; }
.tag-table td { padding: 12px 16px; border-bottom: 1px solid rgba(51,65,85,0.5); font-size: 13px; color: #CBD5E1; }
.tag-table tr:hover td { background: rgba(59,130,246,0.04); }

/* Tag cell */
.tag-cell { display: flex; align-items: center; gap: 8px; }
.tag-cell__check { width: 16px; height: 16px; accent-color: #3B82F6; cursor: pointer; }
.tag-cell__name { background: rgba(59,130,246,0.12); color: #60A5FA; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }

/* Count cell */
.tag-count { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #3B82F6; }

/* Actions cell */
.tag-actions { display: flex; gap: 4px; }

/* Batch bar */
.batch-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1E293B; border-radius: 10px; border: 1px solid #334155; margin-bottom: 16px; }
.batch-bar__info { font-size: 13px; color: #94A3B8; }
.batch-bar__info strong { color: #F1F5F9; }

/* Select all */
.select-all { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94A3B8; cursor: pointer; }
.select-all input { accent-color: #3B82F6; }

/* Empty */
.empty-state { text-align: center; padding: 40px; color: #64748B; font-size: 13px; }
</style>
</head>
<body>

<!-- 页面标题 -->
<div class="page-header">
  <h2 class="page-title">标签管理</h2>
  <span class="page-count">共 44 个标签</span>
</div>

<!-- 工具栏：搜索 + 批量操作 -->
<div class="toolbar">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="搜索标签..." class="search-input">
  </div>
</div>

<!-- 批量操作栏（选中标签时显示） -->
<div class="batch-bar">
  <span class="batch-bar__info">已选 <strong>3</strong> 个标签</span>
  <button class="btn btn--primary btn--sm">合并为...</button>
  <button class="btn btn--danger btn--sm">批量删除</button>
  <button class="btn btn--ghost btn--sm">取消选择</button>
</div>

<!-- 标签表格 -->
<table class="tag-table">
  <thead>
    <tr>
      <th style="width:40px"><label class="select-all"><input type="checkbox"></label></th>
      <th>标签名</th>
      <th style="width:100px">记忆数</th>
      <th style="width:160px">操作</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><input type="checkbox" class="tag-cell__check"></td>
      <td><span class="tag-cell__name">踩坑</span></td>
      <td><span class="tag-count">12</span></td>
      <td class="tag-actions">
        <button class="btn btn--ghost btn--sm">重命名</button>
        <button class="btn btn--ghost btn--sm" style="color:#60A5FA">查看</button>
        <button class="btn btn--ghost btn--sm" style="color:#F87171">删除</button>
      </td>
    </tr>
    <tr>
      <td><input type="checkbox" class="tag-cell__check" checked></td>
      <td><span class="tag-cell__name">项目知识</span></td>
      <td><span class="tag-count">8</span></td>
      <td class="tag-actions">
        <button class="btn btn--ghost btn--sm">重命名</button>
        <button class="btn btn--ghost btn--sm" style="color:#60A5FA">查看</button>
        <button class="btn btn--ghost btn--sm" style="color:#F87171">删除</button>
      </td>
    </tr>
    <tr>
      <td><input type="checkbox" class="tag-cell__check" checked></td>
      <td><span class="tag-cell__name">决策</span></td>
      <td><span class="tag-count">5</span></td>
      <td class="tag-actions">
        <button class="btn btn--ghost btn--sm">重命名</button>
        <button class="btn btn--ghost btn--sm" style="color:#60A5FA">查看</button>
        <button class="btn btn--ghost btn--sm" style="color:#F87171">删除</button>
      </td>
    </tr>
    <tr>
      <td><input type="checkbox" class="tag-cell__check" checked></td>
      <td><span class="tag-cell__name">decision</span></td>
      <td><span class="tag-count">3</span></td>
      <td class="tag-actions">
        <button class="btn btn--ghost btn--sm">重命名</button>
        <button class="btn btn--ghost btn--sm" style="color:#60A5FA">查看</button>
        <button class="btn btn--ghost btn--sm" style="color:#F87171">删除</button>
      </td>
    </tr>
    <tr>
      <td><input type="checkbox" class="tag-cell__check"></td>
      <td><span class="tag-cell__name">MCP</span></td>
      <td><span class="tag-count">3</span></td>
      <td class="tag-actions">
        <button class="btn btn--ghost btn--sm">重命名</button>
        <button class="btn btn--ghost btn--sm" style="color:#60A5FA">查看</button>
        <button class="btn btn--ghost btn--sm" style="color:#F87171">删除</button>
      </td>
    </tr>
  </tbody>
</table>

</body>
</html>
